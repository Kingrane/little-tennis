<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1612" />
    <title>Premium Table Tennis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0e0c0a;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        color: #f7f1e8;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        cursor: none;
        touch-action: none;
      }
      canvas {
        display: block;
        touch-action: none;
      }
      /* Initial loader before React mounts */
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #2a2420 0%, #0e0c0a 70%);
        z-index: 100;
        transition: opacity 0.8s ease;
      }
      #boot.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #boot .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #c9a961;
        margin: 0 5px;
        animation: bob 1.4s infinite ease-in-out;
      }
      #boot .dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      #boot .dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes bob {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        30% {
          transform: translateY(-8px);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
